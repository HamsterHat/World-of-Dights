status.number-research-asm.name = Assembler
status.number-research-asm.description = Contains basic, low-level programms.

item.number-one.name = Unit
item.number-one.description = 1. True. Signal exists. Yes. Many options. But only one meaning.
item.number-one.details = The number of my neurons when I was writing this file

item.number-zero.name = Zero
item.number-zero.description = 0. False. No signal. No. Emptiness. Also many options.
item.number-zero.details = null (alef?)

item.number-bit.name = Bit
item.number-bit.description = A compiled digit of data. Born inside the XOR logic gate, bridging the gap between raw signals and actual bytes.
item.number-bit.details = It's getting crowded on the conveyor belts. Just 7 more of these, and we can finally store a whole character in a Byte register.

item.number-byte.name = Byte
item.number-byte.description = A stable structure composed of 8 bits. The core building block for compiling advanced high-level system software.
item.number-byte.details = Packed and ready to load. Finally, we can store actual instructions instead of just raw electrical signals.

unit.number-system.name = system.bin
unit.number-system.description = Basic executable file. System automation script. The entry point into an infinite computing stream.
unit.number-system.details = Executed with superuser (root) privileges. Heavily optimized to weigh exactly 1 bit. Has no physical armor, but moves at system bus speed, deploying logic out of nowhere.

block.number-core-asm.name = Assembler Core
block.number-core-asm.description = > asm \nASM version 0.8 \n> _ \n\nThe planet's main translator. Converts pure binary chaos of zeros and ones into a stable operating system structure.
block.number-core-asm.details = First boot. Memory allocated. All basic logical signals of Cyberia flow here to become the foundation for future high-level programs. sudo rm -rf won't work, we are at the hardware level.

block.number-xor-gate.name = XOR Logic Gate
block.number-xor-gate.description = Processes opposite logical states (0 and 1) to compile them into a stable Bit of data.
block.number-xor-gate.details = The golden rule of binary logic: if the inputs are different, the output is true. Highly optimized for the UNIX architecture to prevent memory leaks.

block.number-byte-compiler.name = Byte Compiler
block.number-byte-compiler.description = Hardware adder block. Accumulates 8 bits from the data stream and packages them into a fully qualified Byte.
block.number-byte-compiler.details = Compilation successful. No warnings. No syntax errors. Memory registers initialized.

block.number-data-bus.name = Data Bus
block.number-data-bus.description = High-speed system infrastructure designed for rapid transportation of compiled Byte blocks.
block.number-data-bus.details = Operating at a perfect power of two frequency. Moves data blocks with zero latency across the motherboard.

block.number-data-reader.name = Sector Reader
block.number-data-reader.description = Low-level I/O component. Physically scans magnetic disk surfaces to extract raw logical states from Cyberia.
block.number-data-reader.details = Hard Drive spin-up initiated. Beware of long boot times. It takes a few clock cycles to reach maximum rotation speed.

status.number-reaperDamage.name = Reaper Decompilation
status.number-reaperDamage.description = Low-level antivirus patch. Erases unprotected binary code in a single tick.

block.number-zero-wall.name = Zero Wall
block.number-zero-wall.description = A dedicated memory sector completely filled with logical zeros. Creates an impenetrable void to protect the base.
block.number-zero-wall.details = Allocating this barrier costs exactly 1 Byte. Zeroed cells block the execution of any untrusted hostile code.

block.number-zero-wall-large.name = Large Zero Wall
block.number-zero-wall-large.description = Massive 2x2 zeroed memory block. An ideal buffer for absorbing DOS attacks and filtering heavy network traffic.
block.number-zero-wall-large.details = Costs 4 Bytes. Capable of holding the line while your turrets compile new antivirus patches.

block.number-reaper.name = reaper.asm
block.number-reaper.description = System antivirus emitter. Applies the decompilation status effect to Creeper worms and unprotected vanilla units.

unit.number-creeper.name = creeper.asm
unit.number-creeper.description = The first network worm. Rapidly crawls toward system components to trigger a critical buffer crash.
unit.number-creeper.details = Warning: Kaboom! Upon making physical contact with the core architecture, it triggers an overload and forcefully overwrites 64 bytes of memory around it with zeros, obliterating your conveyors.

unit.number-placeholder-king.name = The Great Placeholder
unit.number-placeholder-king.description = [red]No data[]
unit.number-placeholder-king.details = [red]oh no[]

status.number-glitched.name = Glitched
status.number-glitched.description = Critical system file corruption. The unit loses health, lags, and is completely stripped of building and attack permissions.
status.number-glitched.details = CRC Error. The operating system tries to recover sectors, dropping build speed to zero and causing heavy second-long overload spikes.

block.number-data-router.name = Data Bus Router
block.number-data-router.description = Flow splitter. Receives compiled data packets and evenly distributes them across three channels of the motherboard.
block.number-data-router.details = The simplest way to branch your bit stream without losing clock cycles.

block.number-data-and-sorter.name = AND Logic Gate
block.number-data-and-sorter.description = Hardware match filter. Passes the selected logical signal forward only if it evaluates to true, discarding opposing bits into side registers.
block.number-data-and-sorter.details = Operates on pure boolean matching logic: True AND True = True.

block.number-data-junction.name = Bus Junction Node
block.number-data-junction.description = Hardware synchronization bridge. Allows two independent data highways to cross each other without mutual bit corruption.
block.number-data-junction.details = Assembly single-layer board is no longer an issue — this block isolates data streams at the hardware level.


