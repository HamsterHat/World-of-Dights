// 01110000 0111 PLANETS 0101 01101110
planet.number-cyberia.name = Киберия
planet.number-cyberia.description = Место, где код обретает форму

// 01110000 0111 SECTORS 0101 01101110
sector.number-unix.name = UNIX
sector.number-unix.description = Первый шаг. Первый язык. Первый код. То откуда пошло все. Отсюда начался и Linux, и MacOS.\n \nИзучите базовые технологии и защититесь от первых компьютерных вирусов.

// 01110000 0111 CORES 0101 01101110
block.number-core-asm.name = Ядро Ассемблер
block.number-core-asm.description = > asm \nASM version 0.8 \n> _ \n\nГлавный транслятор планеты. Переводит чистый бинарный хаос из нулей и единиц в стабильную структуру операционной системы.
block.number-core-asm.details = Первый запуск. Память выделена. Сюда стекаются все базовые логические сигналы Киберии, чтобы стать фундаментом для будущих высокоуровневых программ. sudo rm -rf не сработает, мы на уровне железа.

// 01110000 0111 ITEMS 0101 01101110
item.number-one.name = Единица
item.number-one.description = 1. Правда. Есть сигнал. Да. Много вариантов. Но смысл один (буквально).
item.number-one.details = Количество моих нейронов когда я писал этот файл

item.number-zero.name = Ноль
item.number-zero.description = 0. Ложь. Нет сигнала. Нет. Пустота. Тоже много вариантов.
item.number-zero.details = null (alef?)

item.number-bit.name = Бит
item.number-bit.description = Скомпилированный разряд данных. Рождён внутри логического вентиля XOR, сокращая пропасть между сырыми сигналами и байтами.
item.number-bit.details = На конвейерах становится тесновато. Еще 7 таких штук, и мы наконец-то сможем упаковать целый символ в регистр Байта.

item.number-byte.name = Байт
item.number-byte.description = Стабильная структура из 8 бит. Главный строительный блок для компиляции продвинутого высокоуровневого софта.
item.number-byte.details = Упакован и готов к отправке. Наконец-то в регистрах можно хранить полноценные команды, а не просто сырые электрические импульсы.

item.number-cmp-item.name = Инструкция CMP
item.number-cmp-item.description = Скомпилированная ассемблерная команда сравнения. Базовый элемент для ветвления логики и принятия решений внутри процессора.
item.number-cmp-item.details = test eax, eax? Нет, старый добрый cmp. Позволяет сравнивать операнды на физическом уровне шины. Использовать осторожно: неправильное сравнение может увести поток выполнения в неразмеченную область памяти.

item.number-jmp-item.name = Инструкция JMP
item.number-jmp-item.description = Скомпилированная команда перехода. Позволяет изменять линейный ход программы, связывая воедино разрозненные логические блоки.
item.number-jmp-item.details = Прыжок в неизвестность. Применяется для реализации циклов и условий. Ошибка в адресе назначения гарантированно вызовет Segmentation Fault, намертво вешая поток ядра.

item.number-mov-item.name = Инструкция MOV
item.number-mov-item.description = Скомпилированная ассемблерная команда перемещения данных. Отвечает за логистику битов между ячейками памяти.
item.number-mov-item.details = mov eax, ebx. Несмотря на название "Move", она не перемещает, а именно копирует данные в целевой регистр, оставляя старый источник нетронутым. Главное — не пытаться сделать mov [mem], [mem] напрямую, железо такого не прощает.

item.number-xor-item.name = Инструкция XOR
item.number-xor-item.description = Скомпилированная команда исключающего ИЛИ. Применяется для инверсии сигналов, простейшего шифрования и сверхбыстрого сброса регистров в ноль.
item.number-xor-item.details = xor eax, eax — классика низкоуровневой магии. Весит меньше и работает быстрее, чем прямая запись нуля через mov. Идеальный способ очистить процессор от мусорных данных перед выполнением нового алгоритма.

// 01110000 0111 BLOCKS 0101 01101110
block.number-xor-gate.name = Логический вентиль XOR
block.number-xor-gate.description = Принимает противоположные логические состояния (0 и 1), компилируя их в стабильный Бит данных через операцию исключающего ИЛИ.
block.number-xor-gate.details = Золотое правило бинарной логики: если сигналы на входе разные, на выходе получается истина. Сверхэффективная структура, оптимизированная под UNIX-архитектуру во избежание утечек памяти.

block.number-micro-asm.name = Микро-ассемблер
block.number-micro-asm.description = Создаёт базовые команды ассемблера.

block.number-byte-compiler.name = Компилятор Байтов
block.number-byte-compiler.description = Аппаратный сумматор. Принимает из потока данных 8 независимых бит и упаковывает их в один полноценный Байт.
block.number-byte-compiler.details = Компиляция успешна. Предупреждений нет. Ошибок синтаксиса нет. Регистры памяти инициализированы.

block.number-cmp-compiler.name = Компилятор инструкций CMP
block.number-cmp-compiler.description = Аппаратный анализатор состояний. Перерабатывает входящие Байты в специализированные инструкции сравнения данных (CMP).
block.number-cmp-compiler.details = Инструкция: CMP dest, src. Выполняет скрытое вычитание, чтобы выставить флаги процессора (Zero, Sign, Overflow). Без этого блока система буквально ослепнет — она не сможет понять, какое число больше, и все условные переходы (JZ/JNZ) превратятся в бесконечный цикл.

block.number-jmp-compiler.name = Компилятор инструкций JMP
block.number-jmp-compiler.description = Синтаксический генератор адресов. Принимает Байты данных и преобразует их в ассемблерные инструкции перехода (JMP) для управления указателем инструкций.
block.number-jmp-compiler.details = Инструкция: JMP label. Перезаписывает регистр указателя команд (EIP/RIP), мгновенно перебрасывая поток выполнения в другую область памяти. Главный инструмент для создания циклов и обхода поврежденных секторов кода Киберии.

block.number-mov-compiler.name = Компилятор инструкций MOV
block.number-mov-compiler.description = Системный контроллер памяти. Принимает Байты и кодирует их в базовые инструкции копирования данных (MOV) для шины процессора.
block.number-mov-compiler.details = Инструкция: MOV dest, src. Пересылает данные из регистра в регистр, из памяти в регистр или наоборот. Самая часто используемая операция на Киберии. По сути, вся твоя база — это один огромный конвейер пересылки байтов, управляемый этой микросхемой.

block.number-xor-compiler.name = Компилятор инструкций XOR
block.number-xor-compiler.description = Синтезатор логических вентилей. Перерабатывает Байты данных в ассемблерные инструкции исключающего ИЛИ (XOR) для побитовых манипуляций.
block.number-xor-compiler.details = Инструкция: XOR dest, src. Физически сравнивает два набора битов: выдает единицу, только если биты различаются. Базовый элемент для криптографического шифрования каналов связи и быстрой очистки памяти на Киберии.


block.number-data-bus.name = Шина Данных
block.number-data-bus.description = Высокоскоростная системная магистраль для быстрой транспортировки скомпилированных блоков Байтов.
block.number-data-bus.details = Работает на идеальной тактовой частоте (степень двойки). Перемещает пакеты данных по материнской плате с нулевой задержкой.

block.number-data-reader.name = Считыватель Секторов
block.number-data-reader.description = Низкоуровневый компонент ввода-вывода. Физически сканирует магнитную поверхность дисков для извлечения сырых логических состояний.
block.number-data-reader.details = Раскрутка шпинделя HDD запущена. Остерегайтесь долгой загрузки системы. Считывающей головке нужно несколько тактов, чтобы выйти на максимальную скорость.

block.number-zero-wall.name = Стена Нулей
block.number-zero-wall.description = Выделенный сектор памяти, до отказа забитый логическими нулями. Создает непреодолимую пустоту для защиты базы.
block.number-zero-wall.details = Запись этого барьера стоит ровно 1 Байт. Занулённые ячейки блокируют выполнение любого левого враждебного кода.

block.number-zero-wall-large.name = Большая Стена Нулей
block.number-zero-wall-large.description = Массивный занулённый сектор 2х2. Идеальный буфер для гашения DOS-атак и фильтрации тяжёлых пакетов.
block.number-zero-wall-large.details = Стоит 4 Байта. Способна сдержать натиск, пока ваши пушки компилируют антивирусные патчи.

block.number-reaper.name = reaper.asm
block.number-reaper.description = Системный антивирусный излучатель.

block.number-chkrootkit.name = chkrootkit.asm
block.number-chkrootkit.description = Антивирус способный удалять больше типов вирусов чем Reaper. Способен стирать большую часть вирусов для UNIX и DOS.

block.number-data-router.name = Маршрутизатор шины
block.number-data-router.description = Разделитель потока. Принимает скомпилированные пакеты данных и равномерно распределяет их по трём направлениям системной платы.
block.number-data-router.details = Простейший способ разветвить поток битов без потери тактовой частоты.

block.number-data-and-sorter.name = Логический вентиль И
block.number-data-and-sorter.description = Аппаратный фильтр совпадения. Пропускает выбранный логический сигнал прямо по курсу шины только в случае его истинности, а противоположные биты сбрасывает в боковые регистры.
block.number-data-and-sorter.details = Работает на чистой булевой логике совпадения: Истина И Истина = Истина.

block.number-data-junction.name = Узел пересечения шин
block.number-data-junction.description = Аппаратный мост синхронизации. Позволяет двум независимым магистралям данных пересекаться крест-накрест без взаимного искажения и перемешивания битов.
block.number-data-junction.details = Однослойная плата Ассемблера больше не проблема — этот блок изолирует потоки на физическом уровне.

// 01110000 0111 UNITS 0101 01101110
unit.number-system.name = system.bin
unit.number-system.description = Базовый исполняемый файл. Системный скрипт автоматизации. Точка входа в бесконечный поток вычислений.
unit.number-system.details = Запущен с правами суперпользователя (root). Оптимизирован настолько, что весит всего 1 бит. Не имеет физической брони, но перемещается со скоростью системной шины, разворачивая логику на пустом месте.

unit.number-creeper.name = creeper.asm
unit.number-creeper.description = Первый сетевой вредоносный червь. Стремительно ползёт к системным узлам, чтобы устроить критический сбой буфера.
unit.number-creeper.details = Внимание: кабум! При физическом контакте с архитектурой ядра запускает перегрузку и принудительно перезаписывает нулями 64 байта памяти вокруг, аннигилируя ваши конвейеры.

unit.number-placeholder-king.name = [royal]Великий Король Плейсхолдеров
unit.number-placeholder-king.description = [red]П Л Е Й С Х О Л Д Е Р[]
unit.number-placeholder-king.details = [red]oh no[]

unit.number-mov.name = mov.asm
unit.number-mov.description = Автономный логистический дрон. Сконструирован исключительно для физического перемещения Нулей и Единиц из удаленных секторов памяти. Не имеет инженерных подсистем для строительства.
unit.number-mov.details = Исполняет бесконечный цикл копирования данных. Благодаря своей архитектуре пересылает базовые информационные биты с невероятной скоростью, заменяя собой стандартные физические конвейеры. Попытка заставить его построить хоть один блок вызывает аппаратное исключение.


// 01110000 0111 RESEARCH 0101 01101110
status.number-research-asm.name = Ассемблер
status.number-research-asm.description = Содержит базовые низкоуровневые программы.

// 01110000 0111 STATUSES 0101 01101110
status.number-reaperDamage.name = Декомпиляция Reaper
status.number-reaperDamage.description = Низкоуровневый антивирусный патч. Стирает незащищённый бинарный код за 1 тик.

status.number-chkrootkitDamage.name = Декомпиляция ChkRootKit
status.number-chkrootkitDamage.description = Антивирусный патч. Используется антивирусом ChkRootKit.

status.number-glitched.name = Глитч
status.number-glitched.description = Критическое искажение системных файлов. Дрон теряет прочность, зависает и полностью лишается прав на сборку и атаку.
status.number-glitched.details = Ошибка CRC. Система пытается восстановить сектора, роняя скорость строительства в ноль и вызывая секундные скачки перегрузки.
