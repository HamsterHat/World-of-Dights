// 01110000 0111 PLANETS 0101 01101110
planet.number-cyberia.name = Киберия
planet.number-cyberia.description = Планета логики, сигналов и бинарного хаоса. Здесь нули и единицы обретают форму, а каждый сигнал — это шаг к созданию цифрового сознания.

// 01110000 0111 CORES 0101 01101110
block.number-core-asm.name = Ядро Ассемблер
block.number-core-asm.description = > asm \nASM version 0.8 \n> _ \n\nГлавный транслятор планеты. Переводит чистый бинарный хаос из нулей и единиц в стабильную структуру операционной системы.
block.number-core-asm.details = Первый запуск. Память выделена. Сюда стекаются все базовые логические сигналы Киберии, чтобы стать фундаментом для будущих высокоуровневых программ. sudo rm -rf не сработает, мы на уровне железа.

// 01110000 0111 ITEMS 0101 01101110
item.number-one.name = Единица
item.number-one.description = 1. Правда. Есть сигнал. Да. Много вариантов. Но смысл один (буквально).
item.number-one.details = Количество моих нейронов когда я писал этот файл

item.number-zero.name = Ноль
item.number-zero.description = 0. Ложь. Нет сигнала. Нет. Пустота. Тоже много вариантов.
item.number-zero.details = null (alef?)

item.number-bit.name = Бит
item.number-bit.description = Скомпилированный разряд данных. Рождён внутри логического вентиля XOR, сокращая пропасть между сырыми сигналами и байтами.
item.number-bit.details = На конвейерах становится тесновато. Еще 7 таких штук, и мы наконец-то сможем упаковать целый символ в регистр Байта.

item.number-byte.name = Байт
item.number-byte.description = Стабильная структура из 8 бит. Главный строительный блок для компиляции продвинутого высокоуровневого софта.
item.number-byte.details = Упакован и готов к отправке. Наконец-то в регистрах можно хранить полноценные команды, а не просто сырые электрические импульсы.

// 01110000 0111 BLOCKS 0101 01101110
block.number-xor-gate.name = Логический вентиль XOR
block.number-xor-gate.description = Принимает противоположные логические состояния (0 и 1), компилируя их в стабильный Бит данных через операцию исключающего ИЛИ.
block.number-xor-gate.details = Золотое правило бинарной логики: если сигналы на входе разные, на выходе получается истина. Сверхэффективная структура, оптимизированная под UNIX-архитектуру во избежание утечек памяти.

block.number-micro-asm.name = Микро-ассемблер
block.number-micro-asm.description = Создаёт базовые команды ассемблера.

block.number-byte-compiler.name = Компилятор Байтов
block.number-byte-compiler.description = Собирает 8 бит в байт — готовый символ для низкоуровневых команд.

// 01110000 0111 UNITS 0101 01101110
unit.number-system.name = system.bin
unit.number-system.description = Базовый исполняемый файл. Системный скрипт автоматизации. Точка входа в бесконечный поток вычислений.
unit.number-system.details = Запущен с правами суперпользователя (root). Оптимизирован настолько, что весит всего 1 бит. Не имеет физической брони, но перемещается со скоростью системной шины, разворачивая логику на пустом месте.

// 01110000 0111 RESEARCH 0101 01101110
status.number-research-asm.name = Ассемблер
status.number-research-asm.description = Содержит базовые низкоуровневые программы.
